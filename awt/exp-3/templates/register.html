{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
    <h2>Register</h2>
    <p class="muted">Create a new user for the Flask authentication experiment.</p>

    <form method="POST">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Choose username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Choose password" required>

        <button type="submit">Register</button>
    </form>

    <p class="muted">Already registered? <a href="{{ url_for('login') }}">Go to login</a></p>
{% endblock %}
